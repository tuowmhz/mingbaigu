# Fly.io 部署配置：新加坡机房，面向海外华语用户
app = "stockprediction-tuo"
primary_region = "sin"

[build]

[env]
  PORT = "8080"

[http_service]
  internal_port = 8080
  force_https = true
  auto_stop_machines = "stop"     # 没人用时自动休眠省钱
  auto_start_machines = true
  min_machines_running = 0

[[vm]]
  memory = "2gb"
  cpu_kind = "shared"
  cpus = 2

[mounts]
  source = "sp_data"
  destination = "/app/data"       # 持仓/提醒/模型缓存持久化
